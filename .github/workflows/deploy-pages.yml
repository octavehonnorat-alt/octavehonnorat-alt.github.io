name: Deploy Nexus to GitHub Pages

on:
  push:
    branches:
      - nexus

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/nexus'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: nexus

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          set -euo pipefail
          test -f nexus/dist/index.html
          rm -rf _site
          mkdir -p _site
          cp -a nexus/dist/. _site/
          cp CNAME _site/CNAME
          cp _site/index.html _site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
