name: Validate static site

on:
  pull_request:
    branches:
      - nexus
  push:
    branches:
      - nexus

jobs:
  validate-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f CNAME
          test -f dist/index.html
          test -d dist/assets

      - name: Check SPA fallback prerequisites
        run: |
          set -euo pipefail
          grep -q "<div id=\"root\"></div>" dist/index.html
          grep -q "assets/" dist/index.html
