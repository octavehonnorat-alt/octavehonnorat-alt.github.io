name: Validate Nexus Static Build

on:
  pull_request:
  push:
    branches:
      - nexus

jobs:
  validate-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f CNAME
          test -f nexus/dist/index.html
          test -d nexus/dist/assets

      - name: Check SPA fallback prerequisites
        run: |
          set -euo pipefail
          grep -q "<div id=\"root\"></div>" nexus/dist/index.html
          grep -q "assets/" nexus/dist/index.html
