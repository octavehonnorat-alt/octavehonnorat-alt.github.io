name: Validate static site

on:
  pull_request:
    branches:
      - nexus
  push:
    branches:
      - nexus

jobs:
  validate-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f CNAME
          if [ -f dist/index.html ]; then
            test -d dist/assets
          else
            test -f index.html
          fi

      - name: Check SPA fallback prerequisites
        run: |
          set -euo pipefail
          if [ -f dist/index.html ]; then
            grep -q "<div id=\"root\"></div>" dist/index.html
            grep -q "assets/" dist/index.html
          else
            grep -q "<div id=\"root\"></div>" index.html
          fi
