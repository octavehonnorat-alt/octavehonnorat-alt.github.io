name: Validate static site

on:
  pull_request:
    branches:
      - nexus2
  push:
    branches:
      - nexus2

jobs:
  validate-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and prepare pages artifact
        run: npm run deploy

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f CNAME
          test -f dist/index.html
          test -d dist/assets
          test -f _site/index.html
          test -f _site/404.html
          test -f _site/CNAME

      - name: Check SPA fallback prerequisites
        run: |
          set -euo pipefail
          grep -q "<div id=\"root\"></div>" dist/index.html
          grep -q "assets/" dist/index.html
